name: Build and Deploy React App

on:
  push:
    branches: [ "main", "master" ]

# הגדרת הרשאות חובה ל-GitHub Pages
permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Install dependencies
      run: npm ci || npm install

    - name: Run lint
      run: npm run lint --if-present # יוסיף יציבות אם אין פקודת לינט מוגדרת

    - name: Build application
      run: npm run build

    - name: Deploy to GitHub Pages
      uses: JamesIves/github-pages-deploy-action@v4
      with:
        folder: dist # תיקיית הפלט ש-Vite מייצר
        branch: gh-pages # הענף האוטומטי שאליו האתר יישמר
